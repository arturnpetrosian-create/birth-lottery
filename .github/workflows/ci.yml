name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff (domain, scripts, tests, app)
        run: ruff check domain scripts tests app

      - name: Pytest
        run: pytest tests/ -q

  html-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML smoke (DOCTYPE, closing html)
        run: |
          f=static/index.html
          head -n 5 "$f" | grep -q "<!DOCTYPE html>" || exit 1
          tail -n 3 "$f" | grep -q "</html>" || exit 1
