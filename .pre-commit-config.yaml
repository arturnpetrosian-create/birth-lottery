# See https://pre-commit.com
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(domain|scripts|tests|app)/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [html, css, javascript, yaml, markdown]
        files: ^(static/|\.github/|docs/).*\.(html|ya?ml|md)$
        exclude: ^static/index\.html$
        args: [--print-width, "100"]
